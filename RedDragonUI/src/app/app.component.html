<div class="app-wrapper">
  <nav class="top-nav" *ngIf="character">
    <div class="nav-brand">
      <span class="dragon-icon">&#x1F525;</span> Red Dragon
    </div>
    <div class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active">Postać</a>
      <a routerLink="/battle" routerLinkActive="active">Walka</a>
      <a routerLink="/shop" routerLinkActive="active">Sklep</a>
      <a routerLink="/inventory" routerLinkActive="active">Ekwipunek</a>
      <a routerLink="/ranking" routerLinkActive="active">Ranking</a>
    </div>
    <div class="nav-info">
      <span class="char-info">{{ character.name }} | Lvl {{ character.level }} | HP {{ character.currentHp }}/{{ character.maxHp }} | Złoto: {{ character.gold }}</span>
    </div>
  </nav>
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
