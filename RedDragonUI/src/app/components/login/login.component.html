<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>&#x1F525; Red Dragon</h1>
      <p>Tekstowa gra RPG w przeglądarce</p>
    </div>

    <div class="tab-switch">
      <button [class.active]="!isRegister" (click)="isRegister = false; error = ''">Logowanie</button>
      <button [class.active]="isRegister" (click)="isRegister = true; error = ''">Rejestracja</button>
    </div>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Nazwa postaci</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="Wpisz nazwę postaci..." required minlength="3">
      </div>
      <div class="form-group">
        <label>Hasło</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Wpisz hasło..." required minlength="4">
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-submit" [disabled]="loading || !name || !password">
        {{ loading ? 'Proszę czekać...' : (isRegister ? 'Stwórz postać' : 'Zaloguj się') }}
      </button>
    </form>

    <div class="race-info" *ngIf="isRegister">
      <h3>Dostępna rasa: Człowiek</h3>
      <p>Zrównoważona rasa z równymi statystykami. Idealna dla początkujących bohaterów.</p>
      <div class="base-stats">
        <span>Siła: 10</span>
        <span>Zręczność: 10</span>
        <span>Inteligencja: 10</span>
        <span>Wytrzymałość: 10</span>
        <span>Szczęście: 10</span>
      </div>
    </div>
  </div>
</div>
