<div class="start-page">
  <div class="start-card">
    <div class="dragon-logo">🐉</div>
    <h1 class="game-title">Red Dragon</h1>
    <p class="game-subtitle">Tekstowa gra RPG</p>
    <div class="divider"></div>
    <p class="game-desc">Walcz z potworami, zdobywaj złoto i doświadczenie, kupuj broń i zbroje. Pokonaj legendarnego Czerwonego Smoka!</p>
    <button class="btn-play" (click)="playAsGuest()" [disabled]="loading">
      <span *ngIf="!loading">⚔️ Graj jako Gość</span>
      <span *ngIf="loading">Łączenie...</span>
    </button>
    <p class="error-msg" *ngIf="error">{{ error }}</p>
  </div>
</div>
