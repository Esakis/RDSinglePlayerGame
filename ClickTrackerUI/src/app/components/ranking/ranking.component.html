<div class="ranking-page">
  <h2>&#x1F3C6; Ranking Bohaterów</h2>

  <div class="loading" *ngIf="loading">Ładowanie rankingu...</div>

  <div class="ranking-table" *ngIf="!loading">
    <div class="ranking-header">
      <span class="col-pos">#</span>
      <span class="col-name">Nazwa</span>
      <span class="col-race">Rasa</span>
      <span class="col-level">Poziom</span>
      <span class="col-exp">Doświadczenie</span>
    </div>
    <div class="ranking-row" *ngFor="let char of rankings; let i = index" [class.top-3]="i < 3">
      <span class="col-pos">
        <span *ngIf="i === 0">&#x1F947;</span>
        <span *ngIf="i === 1">&#x1F948;</span>
        <span *ngIf="i === 2">&#x1F949;</span>
        <span *ngIf="i > 2">{{ i + 1 }}</span>
      </span>
      <span class="col-name">{{ char.name }}</span>
      <span class="col-race">{{ char.race }}</span>
      <span class="col-level">{{ char.level }}</span>
      <span class="col-exp">{{ char.experience }}</span>
    </div>
    <div class="empty-ranking" *ngIf="rankings.length === 0">
      Brak bohaterów w rankingu.
    </div>
  </div>
</div>
